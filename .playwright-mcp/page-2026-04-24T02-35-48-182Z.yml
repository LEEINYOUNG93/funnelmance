          - text: 하지만 장애물을 이겨내지 못하고, 원하는 수준까지 속도감 있게 성장하지 못하여 시장에서 사라져 버리게 됩니다.
          - text: 대부분 마케팅 역량이 부족해서 발생한 실패입니다.
