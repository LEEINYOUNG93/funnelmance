          - text: 에코마케팅이 보유한 마케팅 역량으로 뛰어난 제품을 빠르게 원하는 수준까지 성장시킬 수 있습니다.
          - text: 시장에 처음 진입하는 제품을 메이저로 성장시키고, 시장의 경쟁이 치열한 제품은 시장의 선두로 올라설 수 있도록 만듭니다.
